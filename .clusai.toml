# ============================================================================
# ai-core project config (./.clusai.toml)
# ============================================================================
# Every feature is listed here. Non-basic features default to false.
# Uncomment and set to true to enable.
# ============================================================================

# ─── Global agent ─────────────────────────────────────────────────────────

[agent]
system_prompt = """You are an AI coding assistant. Help users write,
review, and debug code. Use tools when necessary. Be concise."""
max_history = 50
default_provider = "ds"
# default_mode = "single"       # one AI answers
default_mode = "roundtable"     # multiple AIs take turns
# default_mode = "blueprint"    # multi-stage orchestration
# working_dir = "/path/to/project"

# ─── LLM providers (3 examples: api_key, api_key_env, system_prompt_file) ─

[[providers]]
id = "ds"
type = "deepseek"
model = "deepseek-chat"
api_key = "sk-xxxxxxxx"         # ← demo: write key directly

[[providers]]
id = "oa"
type = "openai"
model = "gpt-4o"
api_key_env = "OPENAI_API_KEY"  # ← demo: read key from environment variable

[[providers]]
id = "amiya"
type = "deepseek"
model = "deepseek-chat"
api_key = "sk-xxxxxxxx"
system_prompt_file = "./personas/阿米娅_char_002_amiya.json"  # ← demo: load persona from JSON

# ─── Tool permissions ─────────────────────────────────────────────────────

[tools]
read_enabled    = true
write_enabled   = true
edit_enabled    = true
grep_enabled    = true
glob_enabled    = true
bash_enabled    = false     # dangerous — enable only when needed
allow_paths     = []
deny_paths      = ["/etc", "/sys", "/proc", "/boot"]

# ── declarative capabilities (all disabled by default) ──
# speak_capability  = false   # agent plays MP3 voice by conversational intent
# video_capability  = false   # agent plays WebM video by conversational intent
# ppt_generator     = false   # agent generates PowerPoint from text
# web_search        = false   # agent searches the web
# image_generation  = false   # agent generates images from descriptions

# ─── Roundtable ───────────────────────────────────────────────────────────

[roundtable]
order = []
share_context = false

# ─── Blueprint ────────────────────────────────────────────────────────────

[blueprint]
enabled      = false
default_mode = "orchestrator"
architect    = "ds"
reviewer     = "ds"

# [[blueprint.workers]]
# provider   = "oa"
# languages  = ["rust"]

