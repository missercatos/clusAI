# ====== Tool Settings ======

[tools]
read_enabled = true
write_enabled = true
grep_enabled = true
glob_enabled = true
bash_enabled = false       # disable for safety, enable as needed
allow_paths = []           # empty = working directory only
deny_paths = ["/etc", "/sys", "/proc", "/boot"]

# ====== Roundtable ======

[roundtable]
# order = ["openai", "claude", "local"]
# Leave empty to use all providers in config order

# ====== Blueprint (multi-model collaboration) ======

[blueprint]
enabled = false
default_mode = "orchestrator"
architect = "openai"
reviewer = "openai"

