# ─── Built-in tool permissions + declarative capabilities ────────────────

[tools]
# ── basic I/O (safe by default) ──
read_enabled = true         # agent can read files on disk
write_enabled = true        # agent can create new files
edit_enabled = true         # agent can edit existing files

# ── search (safe by default) ──
grep_enabled = true         # agent can search code content with regex
glob_enabled = true         # agent can search file names with glob patterns

# ── dangerous (disabled by default) ──
bash_enabled = false        # agent can execute arbitrary shell commands — USE WITH CAUTION

# ── path restrictions ──
allow_paths = []            # whitelist of accessible directories (empty = working_dir only)
deny_paths = ["/etc", "/sys", "/proc", "/boot", "/root", "~/.ssh", "~/.gnupg"]

# ── declarative capabilities (disabled by default) ──
# Add any capability name = true here to enable it.
# Capabilities are defined by third-party crates via define_capability! macro.
# speak_capability = false           # agent plays MP3 voice clips by conversational intent
# video_capability = false           # agent plays WebM video clips by conversational intent
# ppt_generator = false             # agent generates PowerPoint files from text
# web_search = false                # agent searches the web via external API
# image_generation = false          # agent generates images from descriptions
# spreadsheet_exporter = false      # agent exports data to .xlsx or .csv
# pdf_reader = false                # agent reads and extracts text from PDFs
# database_query = false            # agent runs read-only queries against a database
# git_operations = false            # agent runs safe git commands (status, log, diff)
# code_executor = false             # agent runs code in a sandboxed environment

# ─── Roundtable: multiple agents take turns discussing one topic ─────────

[roundtable]
order = []                  # speaking order (empty = all providers in config order)
share_context = false       # if true, each agent sees previous agents' responses

# ─── Blueprint: multi-model orchestrated code generation ─────────────────

[blueprint]
enabled = false             # enable blueprint mode (multi-stage code generation)
default_mode = "orchestrator"  # orchestrator | debate | consensus
architect = "main"          # which provider plans the solution
reviewer = "main"           # which provider reviews generated code

