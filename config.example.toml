# ~/.config/clusai/config.toml
# User-level default config. Project-level ./.clusai.toml overrides this.

[agent]
system_prompt = """You are an AI coding assistant. You help users write, review, and debug code.
Use tools when you need to read files, search code, or execute shell commands.
Always explain your reasoning briefly before writing code."""
max_history = 50
default_provider = "openai"
default_mode = "single"

# ====== LLM Providers ======

[[providers]]
id = "openai"
type = "openai"
model = "gpt-4-turbo"
api_key = "sk-xxxxxxxxxxxxxxxxxxxx"   # 直接写 key
# api_key_env = "OPENAI_API_KEY"      # 或通过环境变量

