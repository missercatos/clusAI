# ============================================================================
# Example config for ai-core
# ============================================================================
# Location (first match wins):
#   1. ./.clusai.toml           project-level, overrides global
#   2. ~/.config/clusai/config.toml   global default
#
# All features are shown here. Set to true only what you need.
# Everything beyond basic I/O defaults to false for safety.
# ============================================================================

# ─── Global agent settings ───────────────────────────────────────────────

[agent]
system_prompt = """You are an AI coding assistant. You help users write,
review, and debug code. Use tools when you need to read files, search code,
or execute shell commands."""
max_history = 50         # max context messages to retain
default_provider = "main"
default_mode = "single"  # single | roundtable | blueprint
working_dir = "/home/user/project"  # optional, defaults to cwd

# ─── LLM providers (at least one required) ───────────────────────────────

[[providers]]
id = "main"                     # unique id referenced elsewhere in config
type = "deepseek"               # openai | anthropic | deepseek | ollama | openai-compatible
model = "deepseek-chat"
api_key = "sk-xxxxxxxx"         # write key directly (mutually exclusive with api_key_env)
# api_key_env = "DEEPSEEK_KEY"  # OR read from this environment variable
system_prompt = "You are a helpful coding assistant."  # optional per-provider prompt, overrides [agent]
# system_prompt_file = "./personas/laozi.json"  # OR load persona from a JSON file (takes precedence over system_prompt)
temperature = 0.7               # 0.0–2.0, higher = more random
max_tokens = 8192               # cap on generation length per response
# base_url = "https://api.deepseek.com/v1"  # optional proxy endpoint

