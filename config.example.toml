# ============================================================================
# Example config for ai-core
# ============================================================================
# Location (first match wins):
#   1. ./.clusai.toml               project-level, overrides global
#   2. ~/.config/clusai/config.toml  global default
#
# Every feature is listed here. Non-basic features default to false.
# Uncomment and set to true to enable.
# ============================================================================

# ─── Global agent settings ────────────────────────────────────────────────

[agent]
system_prompt = """You are an AI coding assistant. Help users write,
review, and debug code. Use tools when necessary. Be concise."""
max_history = 50                     # max context messages to retain
default_provider = "ds"
# default_mode = "single"            # one AI answers
# default_mode = "roundtable"        # multiple AIs take turns discussing
# default_mode = "blueprint"         # multi-stage orchestration (architect → workers → reviewer)
# working_dir = "/path/to/project"   # sandbox directory for file tools

# ─── LLM providers (at least one required) ────────────────────────────────
#
# Three authentication styles shown:
#   ds   → writes api_key directly in TOML
#   oa   → reads key from environment variable (api_key_env)
#   amiya→ loads persona from a JSON file (system_prompt_file)
# ============================================================================

[[providers]]
id = "ds"                           # unique identifier
type = "deepseek"                   # openai | anthropic | deepseek | ollama | openai-compatible
model = "deepseek-chat"
api_key = "sk-xxxxxxxx"             # ← demo: write key directly
system_prompt = "You are a helpful coding assistant."  # fallback if no file
# system_prompt_file = "./personas/laozi.json"  # OR load persona from JSON file
temperature = 0.7                   # 0.0–2.0, higher = more creative
max_tokens = 8192                   # cap on generation length per response
speed = 1.0                         # speaking speed (0.0-1.0, 1.0=normal, <1.0=slower pauses)
# base_url = "https://api.deepseek.com/v1"  # optional proxy endpoint

[[providers]]
id = "oa"                           # ← demo: key from environment variable
type = "openai"
model = "gpt-4o"
api_key_env = "OPENAI_API_KEY"      # reads $OPENAI_API_KEY at runtime
temperature = 0.7
max_tokens = 16384

[[providers]]
id = "amiya"                        # ← demo: persona loaded from JSON file
type = "deepseek"
model = "deepseek-chat"
api_key = "sk-xxxxxxxx"
system_prompt_file = "./personas/阿米娅_char_002_amiya.json"
# The persona JSON can be either:
#   A) Simple:   { "system_prompt": "...", "temperature": 0.5 }
#   B) Structured: { "name": "...", "personality": {...}, "relationships": {...} }
#      Kernel auto-generates system_prompt from structured fields.
temperature = 0.7
max_tokens = 8192

